 просто кофейня. Атмосферное место, где каждый уголок продуман. Можно прийти с ноутбуком поработать или просто насладиться тишиной с книгой.",likes:15,platform:"Google"},{id:4,author:"Михаил П.",rating:5,date:"месяц назад",text:"Лучший кофе в Туле, без преувеличений. Фильтр-кофе просто волшебный, чувствуется качество зёрен и мастерство приготовления.",likes:6,platform:"Яндекс"},{id:5,author:"Ольга С.",rating:5,date:"2 месяца назад",text:"Принесли собаку — нас встретили с улыбкой. Пет-френдли атмосфера, вкуснейший матча латте и невероятно красивый интерьер.",likes:9,platform:"Google"},{id:6,author:"Алексей Н.",rating:5,date:"2 месяца назад",text:"Работаю удалённо, и это мой любимый коворкинг. Wi-Fi отличный, розетки есть везде, кофе бесконечный. Что ещё нужно?",likes:11,platform:"Яндекс"},{id:7,author:"Ксения Л.",rating:5,date:"2 месяца назад",text:"Чизкейк здесь — это что-то невероятное. Нежный, с правильной текстурой, не приторный. Идеально сочетается с их флэт уайтом.",likes:7,platform:"Google"},{id:8,author:"Игорь В.",rating:5,date:"3 месяца назад",text:"Пришёл на свидание — остались в восторге оба. Интимная атмосфера, приглушённый свет, отличный сервис. Рекомендую для романтических встреч.",likes:14,platform:"Яндекс"},{id:9,author:"Наталья Р.",rating:5,date:"3 месяца назад",text:"Наконец-то в Туле появилось место с настоящим specialty coffee. Бариста рассказали о происхождении зёрен, это ценно.",likes:5,platform:"Google"},{id:10,author:"Сергей М.",rating:5,date:"3 месяца назад",text:"Завтраки здесь — отдельная история. Авокадо-тост с яйцом пашот — мой must-have каждое утро. Свежие ингредиенты, красивая подача.",likes:10,platform:"Яндекс"},{id:11,author:"Виктория А.",rating:5,date:"4 месяца назад",text:"Обожаю их сезонные напитки. Лавандовый раф — это поэзия, а не просто кофе. Жду каждое обновление меню с нетерпением.",likes:8,platform:"Google"},{id:12,author:"Андрей Т.",rating:5,date:"4 месяца назад",text:"Был проездом в Туле, зашёл по отзывам. Не пожалел! Теперь каждый раз, когда бываю в городе, обязательно захожу.",likes:4,platform:"Яндекс"},{id:13,author:"Марина К.",rating:5,date:"4 месяца назад",text:"Интерьер в стиле минимализма, но очень тёплый. Дерево, мягкий свет, удобные кресла. Можно сидеть часами.",likes:6,platform:"Google"},{id:14,author:"Павел З.",rating:5,date:"5 месяцев назад",text:"Цены адекватные для такого качества. Капучино за 240 ₽ — это подарок. В Москве такой стоил бы в два раза дороже.",likes:13,platform:"Яндекс"},{id:15,author:"Юлия Е.",rating:5,date:"5 месяцев назад",text:"Праздновала здесь день рождения с подругами. Персонал был невероятно внимательным, даже свечку в десерт поставили. Спасибо!",likes:9,platform:"Google"},{id:16,author:"Роман С.",rating:5,date:"5 месяцев назад",text:"Кофе с собой всегда упаковано идеально — не прольётся, не остынет быстро. Детали, которые ценишь как постоянный клиент.",likes:7,platform:"Яндекс"},{id:17,author:"Татьяна Н.",rating:5,date:"6 месяцев назад",text:'Мой сын в восторге от их горячего шоколада. Говорит, что это "настоящий", не из порошка. Редкость в наше время.',likes:5,platform:"Google"},{id:18,author:"Григорий Л.",rating:5,date:"6 месяцев назад",text:"Провёл здесь целый день, готовился к экзаменам. Тишина, комфорт, отличный кофе — идеальные условия для концентрации.",likes:8,platform:"Яндекс"},{id:19,author:"Светлана О.",rating:5,date:"6 месяцев назад",text:"Тирамису здесь — лучший в городе. Пропитан идеально, кофейный вкус насыщенный, но не горький. Настоящий итальянский рецепт.",likes:11,platform:"Google"},{id:20,author:"Денис В.",rating:5,date:"7 месяцев назад",text:"Локация отличная — рядом парк, можно взять кофе и пойти гулять. Или наоборот, отдохнуть после прогулки.",likes:6,platform:"Яндекс"},{id:21,author:"Алина М.",rating:5,date:"7 месяцев назад",text:"Фотографировала здесь контент для блога. Получилось эстетично и органично. Интерьер очень Instagram-friendly.",likes:14,platform:"Google"},{id:22,author:"Борис К.",rating:5,date:"7 месяцев назад",text:"Как любитель кофе, могу сказать — здесь знают толк в зёрнах. Профили обжарки разные, можно выбрать под свой вкус.",likes:9,platform:"Яндекс"},{id:23,author:"Жанна Р.",rating:5,date:"8 месяцев назад",text:"Медовик — бомба! Многослойный, сметанный крем, не приторный. Делюсь всегда с мамой, она теперь тоже фанат.",likes:7,platform:"Google"},{id:24,author:"Владимир П.",rating:5,date:"8 месяцев назад",text:"Привык к сетевым кофейням, но это место совсем другое. Душа, внимание к деталям, персональный подход.",likes:10,platform:"Яндекс"},{id:25,author:"Екатерина С.",rating:5,date:"8 месяцев назад",text:"Веганские опции есть! Растительное молоко без доплаты, что редкость. Овсяное латте — мой фаворит.",likes:12,platform:"Google"},{id:26,author:"Артём З.",rating:5,date:"9 месяцев назад",text:"Гранола с йогуртом — идеальный старт дня. Домашняя, с сезонными фруктами, не из пакета.",likes:5,platform:"Яндекс"},{id:27,author:"Полина В.",rating:5,date:"9 месяцев назад",text:"Шоколадный фондан с ванильным мороженым — must try! Жидкий центр, насыщенный вкус, идеальное сочетание температур.",likes:15,platform:"Google"},{id:28,author:"Максим Л.",rating:5,date:"9 месяцев назад",text:"Провёл здесь первое свидание с девушкой, которая стала моей женой. Теперь приходим на годовщины. Особенное место.",likes:20,platform:"Яндекс"},{id:29,author:"Ирина Н.",rating:5,date:"10 месяцев назад",text:"Чистота, порядок, всё блестит. Видно, что следят за гигиеной. Важно для меня как для перфекциониста.",likes:8,platform:"Google"},{id:30,author:"Станислав М.",rating:5,date:"10 месяцев назад",text:"Круассан миндальный — это что-то с чем-то. Хрустящий, с нежной начинкой, не слишком сладкий.",likes:6,platform:"Яндекс"},{id:31,author:"Вероника А.",rating:5,date:"10 месяцев назад",text:"Обслуживание быстрое, даже когда очередь. Бариста работают слаженно, не теряются в пиковые часы.",likes:7,platform:"Google"},{id:32,author:"Константин Р.",rating:5,date:"11 месяцев назад",text:"Матча латте — лучший в городе. Правильно взбита, без комочков, яркий вкус. Настоящая японская матча.",likes:11,platform:"Яндекс"},{id:33,author:"Людмила Т.",rating:5,date:"11 месяцев назад",text:"Привела сюда подругу из Москвы — она была в восторге. Сказала, что не хуже столичных заведений.",likes:9,platform:"Google"},{id:34,author:"Евгений К.",rating:5,date:"год назад",text:"С первого визита понял, что это моё место. За год ничего не изменилось — качество на высоте, атмосфера по-прежнему уютная.",likes:13,platform:"Яндекс"}];function U5(){const[n,i]=E.useState(6),s=5,r=Mr.length,u=[{stars:5,count:34,percentage:100},{stars:4,count:0,percentage:0},{stars:3,count:0,percentage:0},{stars:2,count:0,percentage:0},{stars:1,count:0,percentage:0}],f=Mr.slice(0,n);return g.jsx("div",{className:"min-h-screen bg-[#0a0a0a] pt-32 pb-24 px-6",children:g.jsxs("div",{className:"max-w-7xl mx-auto",children:[g.jsx(gt,{children:g.jsxs("div",{className:"text-center mb-16",children:[g.jsx("p",{className:"text-sm text-[#c9a962] tracking-[0.3em] uppercase mb-4",children:"Отзывы"}),g.jsx("h1",{className:"text-4xl md:text-6xl lg:text-7xl font-extralight text-[#f5f0e8] mb-6",children:g.jsx(Wl,{text:"Голоса гостей"})}),g.jsx("p",{className:"text-lg text-[#f5f0e8]/60 max-w-2xl mx-auto",children:"34 истории. 34 момента. Каждый отзыв — это благодарность."})]})}),g.jsx(gt,{children:g.jsx("div",{className:"glass rounded-3xl p-8 md:p-12 mb-16",children:g.jsxs("div",{className:"grid md:grid-cols-2 gap-12 items-center",children:[g.jsxs("div",{className:"text-center md:text-left",children:[g.jsxs("div",{className:"flex items-center justify-center md:justify-start gap-4 mb-4",children:[g.jsx("span",{className:"text-6xl md:text-7xl font-extralight text-[#f5f0e8]",children:s.toFixed(1)}),g.jsxs("div",{className:"flex flex-col items-start",children:[g.jsx("div",{className:"flex gap-1 mb-1",children:[...Array(5)].map((d,m)=>g.jsx(ji,{className:"w-5 h-5 fill-[#c9a962] text-[#c9a962]"},m))}),g.jsxs("span",{className:"text-sm text-[#f5f
